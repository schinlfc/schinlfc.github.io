name: Update Google Scholar citations

# Refresh json/citations.json from the public Google Scholar profile once a
# week. The scraper (scripts/update_citations.py) is safe by design: if Google
# blocks the runner it leaves the JSON untouched, so a blocked run is a no-op
# (green, no commit) rather than a regression.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Refresh citation counts
        env:
          # Add a repo secret named SERPAPI_KEY for reliable, un-blockable
          # fetches. If it's absent, the script falls back to a direct scrape.
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python3 scripts/update_citations.py

      - name: Commit if changed
        run: |
          if ! git diff --quiet -- json/citations.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add json/citations.json
            git commit -m "chore: refresh Google Scholar citation counts"
            git push
          else
            echo "No citation changes."
          fi
