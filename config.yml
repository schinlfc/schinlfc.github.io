          title: Sayorn Chin, Ph.D.
          subtitle: "I am an applied microeconomist and an Assistant Professor of Economics at Lafayette College. I also hold the position of Data Science Fellow Affiliate at Mountain Data Group. My research addresses policy-related questions by employing a wide range of machine learning techniques and econometric methods. These techniques and methods encompass NLP, causal forest, dynamic panel data estimators, natural experiments, and microsimulations to examine the relationship between inequality and its influence on health and well-being. I completed my Ph.D. and M.A. in Economics at Colorado State University. I also earned a B.A. in Mathematical Economics at Colorado College."
          imageUrl: "/picture.jpeg"
